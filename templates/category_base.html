{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ category_name }} Collection | Ethnic Vault</title>

<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#F8F3EA;
    overflow-x:hidden;
}

/* BACKGROUND */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(248,243,234,0.92),rgba(248,243,234,0.92)),
    url("{% static 'images/ethnic-pattern.png' %}");
    background-size:320px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(184,146,76,0.12);
    border-radius:50%;
    top:-150px;
    right:-150px;
    filter:blur(90px);
    z-index:-1;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 60px;
}

.back-btn{
    background:#111827;
    color:#D8B56A;
    padding:12px 20px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    background:#B8924C;
    color:white;
}

/* BRAND */

.brand{
    display:flex;
    align-items:center;
    gap:14px;
}

.brand-icon{
    width:50px;
    height:50px;
    border-radius:14px;
    background:linear-gradient(135deg,#B8924C,#D8B56A);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

/* HERO */

.hero-section{
    margin:20px 60px;
    padding:70px;
    border-radius:30px;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.7)),
    url("{% static 'images/banner1.jpeg' %}");
    background-size:cover;
    color:white;
}

.hero-section h1{
    font-family:'Playfair Display',serif;
    font-size:52px;
    color:#F8E7C2;
}

/* GRID */

.design-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:28px;
    padding:40px 60px;
}

/* CARD */

.design-card{
    background:rgba(255,255,255,0.78);
    border-radius:28px;
    overflow:hidden;
    position:relative;
    transition:0.4s;
}

.design-card:hover{
    transform:translateY(-10px);
}

/* IMAGE */

.image-wrapper{
    position:relative;
    overflow:hidden;
}

.image-wrapper img{
    width:100%;
    height:380px;
    object-fit:cover;
    transition:0.5s;
}

.design-card:hover img{
    transform:scale(1.08);
}

/* ================= WISHLIST HEART ================= */

.wishlist-icon{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:3;
    transition:0.3s;
    font-size:18px;
    color:#111;
}

.wishlist-icon:hover{
    transform:scale(1.1);
}

/* ACTIVE HEART (RED) */
.wishlist-icon.active{
    background:#fff0f0;
    color:#e60023;
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.75),transparent);
    opacity:0;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:20px;
    transition:0.4s;
}

.design-card:hover .overlay{
    opacity:1;
}

/* BUTTONS */

.overlay-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
}

.overlay-buttons a{
    text-align:center;
    padding:12px;
    border-radius:12px;
    font-weight:600;
    text-decoration:none;
}

/* VIEW */

.view-btn{
    background:white;
    color:#111;
}

/* CART */

.cart-btn{
    background:#B8924C;
    color:white;
}

/* CONTENT */

.card-content{
    padding:20px;
}

.design-title{
    font-size:20px;
    font-weight:700;
}

.design-price{
    color:#B8924C;
    font-size:22px;
    font-weight:700;
    margin-top:8px;
}

/* TOAST MESSAGE */

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:14px 22px;
    border-radius:30px;
    font-size:14px;
    opacity:0;
    transition:0.4s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    bottom:50px;
}

</style>

</head>

<body>

<!-- TOP -->

<div class="topbar">

    <a href="/" class="back-btn">← Back</a>

    <div class="brand">
        <div class="brand-icon"><i class="fa fa-crown"></i></div>
        <h2>Ethnic Vault</h2>
    </div>

</div>

<!-- HERO -->

<div class="hero-section">
    <h1>{{ category_name }} Collection</h1>
</div>

<!-- GRID -->

{% if design %}

<div class="design-grid">

{% for d in design %}

<div class="design-card">

    <div class="image-wrapper">

        <!-- WISHLIST HEART -->
        <div class="wishlist-icon" onclick="toggleWishlist(this)">
            <i class="fa-regular fa-heart"></i>
        </div>

        <img src="{{ d.design_image1.url }}">

        <div class="overlay">

            <div class="overlay-buttons">

                <a href="{% url 'view_design_details' d.id %}" class="view-btn">
                    View Details
                </a>

                <a href="{% url 'add_to_cart' d.id %}" class="cart-btn"
                   onclick="showToast('Added to cart 🛒')">
                    Add to Cart
                </a>

            </div>

        </div>

    </div>

    <div class="card-content">

        <div class="design-title">{{ d.design_title }}</div>

        <div class="design-price">₹{{ d.charges }}</div>

    </div>

</div>

{% endfor %}

</div>

{% endif %}

<!-- TOAST -->

<div id="toast" class="toast">Added</div>

<script>

/* ================= WISHLIST TOGGLE ================= */

function toggleWishlist(el){

    let icon = el.querySelector("i");

    el.classList.toggle("active");

    if(el.classList.contains("active")){
        icon.classList.remove("fa-regular");
        icon.classList.add("fa-solid");
        showToast("Added to Wishlist ❤️");
    } else {
        icon.classList.remove("fa-solid");
        icon.classList.add("fa-regular");
        showToast("Removed from Wishlist 💔");
    }
}

/* ================= TOAST ================= */

function showToast(message){

    let toast = document.getElementById("toast");

    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

</script>

</body>
</html>
