<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ design.design_title }} | Ethnic Wear Rentals</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
        }
        .header {
            padding: 15px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .detail-card {
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            margin-top: 30px;
            background: #fff;
        }
        .carousel-item img {
            height: 350px;
            object-fit: contain;
            background: #f8f9fa;
        }
        .btn-back {
            margin-top: 20px;
        }
    </style>
    <script>
        window.print()
    </script>
</head>
<body>

<!-- Header -->
<div class="container header">
   
</div>

<div class="container">
    <div class="card detail-card">

      <div class="row gx-3 mb-4">
    {% if design.design_image1 %}
    <div class="col-md-4 col-12 mb-3 mb-md-0">
        <img src="/media/{{ design.design_image1 }}" class="img-fluid detail-img">
    </div>
    {% endif %}

    {% if design.design_image2 %}
    <div class="col-md-4 col-12 mb-3 mb-md-0">
        <img src="/media/{{ design.design_image2 }}" class="img-fluid detail-img">
    </div>
    {% endif %}

    {% if design.design_image3 %}
    <div class="col-md-4 col-12 mb-3 mb-md-0">
        <img src="/media/{{ design.design_image3 }}" class="img-fluid detail-img">
    </div>
    {% endif %}
</div>

        <!-- Details -->
        <div class="card-body">
            <h3 class="mt-3">{{ design.design_title }}</h3>
         

            <p>{{ design.design_description }}</p>

            

          

         
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
