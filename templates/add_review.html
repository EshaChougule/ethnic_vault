{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Review</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    background:#F8F3EA;
    font-family:'Poppins',sans-serif;
    padding:50px;
}

.review-box{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
    font-size:34px;
    font-weight:700;
    margin-bottom:30px;
    text-align:center;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.input-box input,
.input-box textarea,
.input-box select{

    width:100%;

    padding:14px;

    border-radius:12px;

    border:1px solid #ddd;

    font-family:'Poppins',sans-serif;
}

textarea{
    resize:none;
    height:140px;
}

.submit-btn{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:#C5A572;

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;
}

.submit-btn:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="review-box">

    <div class="title">
        Add Review
    </div>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="input-box">

            <label>Rating</label>

            <select name="rating" required>

                <option value="">Select Rating</option>

                <option value="5">⭐⭐⭐⭐⭐</option>

                <option value="4">⭐⭐⭐⭐</option>

                <option value="3">⭐⭐⭐</option>

                <option value="2">⭐⭐</option>

                <option value="1">⭐</option>

            </select>

        </div>

        <div class="input-box">

            <label>Review Message</label>

            <textarea
            name="review_message"
            placeholder="Write your experience..."
            required></textarea>

        </div>

        <div class="input-box">

            <label>Upload Review Image (Optional)</label>

            <input type="file" name="review_image">

        </div>

        <button type="submit" class="submit-btn">

            Submit Review

        </button>

    </form>

</div>

</body>
</html>
